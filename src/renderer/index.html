<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Grove</title>
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' http://localhost:* http://127.0.0.1:* ws://localhost:* ws://127.0.0.1:*"
    />
    <!--
      Flash-prevention: apply the stored theme BEFORE the page renders.
      This runs synchronously, before any JS modules load, so there's no
      flash of the default dark theme when a different theme is selected.
    -->
    <script>
      (function () {
        var t = localStorage.getItem("grove:theme");
        var valid = [
          "catppuccin-mocha",
          "catppuccin-latte",
          "tokyo-night",
          "evergreen",
        ];
        if (t && valid.indexOf(t) !== -1) {
          document.documentElement.setAttribute("data-theme", t);
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
